<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bhagavad Gita Wisdom — Ask Krishna</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <style>
      /* ── Chat top-bar ── */
      .chat-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 22px;
        background: linear-gradient(135deg, #1B2A4E, #0D1B2A);
        border-bottom: 1px solid rgba(212,175,55,0.4);
        flex-shrink: 0;
      }
      .chat-nav-left a {
        color: rgba(245,230,161,0.65);
        text-decoration: none;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: color 0.2s;
      }
      .chat-nav-left a:hover { color: #D4AF37; }
      .chat-nav-center {
        font-family: 'Cinzel', serif;
        color: #F5E6A1;
        font-size: 17px;
      }
      .chat-nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .user-chip {
        display: flex;
        align-items: center;
        gap: 7px;
        background: rgba(212,175,55,0.1);
        border: 1px solid rgba(212,175,55,0.25);
        border-radius: 50px;
        padding: 5px 14px 5px 8px;
        font-size: 13px;
        color: #F5E6A1;
      }
      .user-chip-avatar {
        width: 26px; height: 26px;
        border-radius: 50%;
        background: linear-gradient(135deg, #D4AF37, #F5E6A1);
        color: #0D1B2A;
        font-size: 12px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn-logout {
        background: transparent;
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 50px;
        padding: 5px 14px;
        color: rgba(245,230,161,0.6);
        font-size: 12px;
        font-family: 'Poppins', sans-serif;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      }
      .btn-logout:hover { border-color: #D4AF37; color: #D4AF37; }
      .btn-login-link {
        color: rgba(245,230,161,0.6);
        text-decoration: none;
        font-size: 12px;
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 50px;
        padding: 5px 14px;
        transition: border-color 0.2s, color 0.2s;
      }
      .btn-login-link:hover { border-color: #D4AF37; color: #D4AF37; }

      /* Make container fill the viewport with nav bar */
      body { overflow: hidden; }
      .container {
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <div class="krishna-bg"></div>

    <div class="container">

      <!-- Top nav bar -->
      <div class="chat-nav">
        <div class="chat-nav-left">
          <a href="index.html">&#8592; Home</a>
        </div>
        <div class="chat-nav-center">🪷 Gita Wisdom</div>
        <div class="chat-nav-right" id="chatNavRight">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Header -->
      <div class="header">
        <h1>🪷 Bhagavad Gita Wisdom</h1>
        <p>Timeless guidance for modern life</p>
      </div>

      <!-- Chat messages -->
      <div class="chat-container" id="chatContainer">
        <div class="message bot-message">
          <div class="message-content">
            🙏 Namaste! I am your guide to the Bhagavad Gita. Ask me about duty,
            karma, devotion, or life wisdom.
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-container">
        <input
          type="text"
          id="questionInput"
          placeholder="Ask Krishna your question…"
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="sendQuestion()" id="sendButton">Send</button>
      </div>

    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script>
      // ── Populate nav based on auth state ──
      function renderChatNav() {
        const user = getUser();
        const navRight = document.getElementById('chatNavRight');
        if (user) {
          const initial = user.name.charAt(0).toUpperCase();
          const firstName = user.name.split(' ')[0];
          navRight.innerHTML = `
            <div class="user-chip">
              <div class="user-chip-avatar">${initial}</div>
              ${firstName}
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
          `;
        } else {
          navRight.innerHTML = `
            <a href="login.html" class="btn-login-link">Login / Register</a>
          `;
        }
      }

      renderChatNav();
    </script>
  </body>
</html>
