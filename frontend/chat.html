<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bhagavad Gita Wisdom — Ask Krishna</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css" />

    <style>
      /* ── Reset body for full-height layout ── */
      html, body { height: 100%; overflow: hidden; }

      body {
        display: flex;
        flex-direction: column;
      }

      /* ── Top navbar ── */
      .chat-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        background: linear-gradient(135deg, #1B2A4E, #0D1B2A);
        border-bottom: 1px solid rgba(212,175,55,0.35);
        flex-shrink: 0;
        z-index: 100;
        height: 52px;
      }
      .chat-nav-left { display: flex; align-items: center; gap: 12px; }
      .chat-nav-left a {
        color: rgba(245,230,161,0.65);
        text-decoration: none;
        font-size: 13px;
        transition: color 0.2s;
      }
      .chat-nav-left a:hover { color: #D4AF37; }
      .btn-sidebar-toggle {
        display: none;
        background: transparent;
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 8px;
        padding: 5px 10px;
        color: rgba(245,230,161,0.7);
        font-size: 16px;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
        line-height: 1;
      }
      .btn-sidebar-toggle:hover { border-color: #D4AF37; color: #D4AF37; }
      .chat-nav-title {
        font-family: 'Cinzel', serif;
        color: #F5E6A1;
        font-size: 16px;
      }
      .chat-nav-right { display: flex; align-items: center; gap: 10px; }
      .user-chip {
        display: flex; align-items: center; gap: 7px;
        background: rgba(212,175,55,0.1);
        border: 1px solid rgba(212,175,55,0.25);
        border-radius: 50px;
        padding: 4px 13px 4px 7px;
        font-size: 13px;
        color: #F5E6A1;
      }
      .user-chip-avatar {
        width: 24px; height: 24px; border-radius: 50%;
        background: linear-gradient(135deg, #D4AF37, #F5E6A1);
        color: #0D1B2A; font-size: 11px; font-weight: 700;
        display: flex; align-items: center; justify-content: center;
      }
      .btn-logout {
        background: transparent;
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 50px; padding: 4px 13px;
        color: rgba(245,230,161,0.6); font-size: 12px;
        font-family: 'Poppins', sans-serif; cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      }
      .btn-logout:hover { border-color: #D4AF37; color: #D4AF37; }
      .btn-login-link {
        color: rgba(245,230,161,0.6); text-decoration: none; font-size: 12px;
        border: 1px solid rgba(212,175,55,0.3); border-radius: 50px; padding: 4px 13px;
        transition: border-color 0.2s, color 0.2s;
      }
      .btn-login-link:hover { border-color: #D4AF37; color: #D4AF37; }

      /* ── Main layout: sidebar + chat ── */
      .chat-layout {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 272px;
        flex-shrink: 0;
        background: rgba(9, 19, 32, 0.97);
        border-right: 1px solid rgba(212,175,55,0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: transform 0.3s ease, width 0.3s ease;
      }
      .sidebar.collapsed {
        width: 0;
        border-right: none;
      }

      .sidebar-header {
        padding: 16px 16px 12px;
        border-bottom: 1px solid rgba(212,175,55,0.15);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .sidebar-header-title {
        font-family: 'Cinzel', serif;
        font-size: 13px;
        color: rgba(212,175,55,0.8);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .btn-new-chat {
        display: flex; align-items: center; gap: 5px;
        padding: 6px 13px;
        border: 1px solid rgba(212,175,55,0.4);
        border-radius: 50px;
        background: transparent;
        color: #F5E6A1; font-size: 12px;
        font-family: 'Poppins', sans-serif; cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        white-space: nowrap;
      }
      .btn-new-chat:hover {
        background: rgba(212,175,55,0.12);
        border-color: #D4AF37;
      }

      .sidebar-body {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      .sidebar-body::-webkit-scrollbar { width: 4px; }
      .sidebar-body::-webkit-scrollbar-thumb {
        background: rgba(212,175,55,0.2); border-radius: 4px;
      }

      /* Guest prompt inside sidebar */
      .sidebar-guest {
        padding: 24px 16px;
        text-align: center;
      }
      .sidebar-guest p {
        color: rgba(245,230,161,0.4);
        font-size: 13px; line-height: 1.6; margin-bottom: 16px;
        font-weight: 300;
      }
      .sidebar-guest a {
        display: inline-block;
        padding: 8px 20px;
        border: 1px solid rgba(212,175,55,0.4);
        border-radius: 50px;
        color: #D4AF37; font-size: 13px; text-decoration: none;
        transition: background 0.2s;
      }
      .sidebar-guest a:hover { background: rgba(212,175,55,0.1); }

      /* Date group label */
      .history-group-label {
        padding: 10px 16px 4px;
        font-size: 11px;
        color: rgba(212,175,55,0.45);
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      /* History item */
      .history-item {
        position: relative;
        padding: 10px 16px;
        cursor: pointer;
        transition: background 0.15s;
        border-left: 2px solid transparent;
      }
      .history-item:hover {
        background: rgba(212,175,55,0.07);
        border-left-color: rgba(212,175,55,0.4);
      }
      .history-item.active {
        background: rgba(212,175,55,0.1);
        border-left-color: #D4AF37;
      }
      .history-item-question {
        font-size: 13px;
        color: rgba(245,230,161,0.75);
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding-right: 28px;
      }
      .history-item-date {
        font-size: 11px;
        color: rgba(245,230,161,0.3);
        margin-top: 3px;
      }
      .history-item-delete {
        position: absolute;
        right: 10px; top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none; cursor: pointer;
        color: rgba(245,230,161,0.25);
        font-size: 15px; padding: 4px;
        opacity: 0; transition: opacity 0.15s, color 0.15s;
        line-height: 1;
      }
      .history-item:hover .history-item-delete { opacity: 1; }
      .history-item-delete:hover { color: #ff6b6b; }

      /* Empty state */
      .sidebar-empty {
        padding: 32px 16px;
        text-align: center;
        color: rgba(245,230,161,0.3);
        font-size: 13px;
        line-height: 1.6;
        font-weight: 300;
      }
      .sidebar-empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.5; }

      /* Clear history button */
      .sidebar-footer {
        padding: 12px 16px;
        border-top: 1px solid rgba(212,175,55,0.12);
        flex-shrink: 0;
      }
      .btn-clear-history {
        width: 100%;
        padding: 8px;
        background: transparent;
        border: 1px solid rgba(220,53,69,0.3);
        border-radius: 8px;
        color: rgba(255,107,107,0.6);
        font-size: 12px; font-family: 'Poppins', sans-serif;
        cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
      }
      .btn-clear-history:hover {
        border-color: rgba(220,53,69,0.7);
        color: #ff6b6b;
        background: rgba(220,53,69,0.06);
      }

      /* ── Chat main area ── */
      .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        /* reuse .container styles but without border-radius on sides */
        background: #FAF9F6;
      }

      /* Override container for layout */
      .chat-main .header {
        padding: 18px 22px;
        text-align: center;
        background: linear-gradient(135deg, #1B2A4E, #0D1B2A);
        color: #F5E6A1;
        border-bottom: 1px solid rgba(212,175,55,0.4);
        flex-shrink: 0;
      }
      .chat-main .header h1 {
        font-family: 'Cinzel', serif; font-size: 22px; margin-bottom: 4px;
      }
      .chat-main .header p { font-size: 13px; opacity: 0.85; }

      .chat-main .chat-container {
        flex: 1;
        padding: 20px 24px;
        overflow-y: auto;
        background: linear-gradient(#FAF9F6, #FDFBF5);
      }
      .chat-main .input-container {
        display: flex; gap: 12px; padding: 16px 20px;
        background: #FAF9F6;
        border-top: 1px solid rgba(212,175,55,0.4);
        flex-shrink: 0;
      }

      /* ── Mobile sidebar overlay ── */
      @media (max-width: 768px) {
        .btn-sidebar-toggle { display: flex; }

        .sidebar {
          position: fixed;
          top: 52px; left: 0; bottom: 0;
          z-index: 200;
          width: 280px;
          transform: translateX(0);
          box-shadow: 4px 0 24px rgba(0,0,0,0.5);
        }
        .sidebar.collapsed {
          width: 280px;
          transform: translateX(-100%);
        }

        .sidebar-overlay {
          display: none;
          position: fixed; inset: 0; top: 52px;
          background: rgba(0,0,0,0.5);
          z-index: 199;
        }
        .sidebar-overlay.visible { display: block; }
      }
    </style>
  </head>

  <body>
    <div class="krishna-bg"></div>

    <!-- Top navbar -->
    <div class="chat-nav">
      <div class="chat-nav-left">
        <button class="btn-sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle history">&#9776;</button>
        <a href="index.html">&#8592; Home</a>
      </div>
      <div class="chat-nav-title">🪷 Gita Wisdom</div>
      <div class="chat-nav-right" id="chatNavRight"></div>
    </div>

    <!-- Mobile overlay (closes sidebar on tap) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Main layout -->
    <div class="chat-layout">

      <!-- ── Sidebar ── -->
      <div class="sidebar collapsed" id="sidebar">

        <div class="sidebar-header">
          <span class="sidebar-header-title">History</span>
          <button class="btn-new-chat" onclick="newChat()">&#43; New Chat</button>
        </div>

        <div class="sidebar-body" id="historyList">
          <!-- populated by JS -->
        </div>

        <div class="sidebar-footer" id="sidebarFooter" style="display:none;">
          <button class="btn-clear-history" onclick="clearAllHistory()">Clear all history</button>
        </div>

      </div>

      <!-- ── Chat area ── -->
      <div class="chat-main">

        <div class="header">
          <h1>🪷 Bhagavad Gita Wisdom</h1>
          <p>Timeless guidance for modern life</p>
        </div>

        <div class="chat-container" id="chatContainer">
          <div class="message bot-message">
            <div class="message-content">
              🙏 Namaste! I am your guide to the Bhagavad Gita. Ask me about duty,
              karma, devotion, or life wisdom.
            </div>
          </div>
        </div>

        <div class="input-container">
          <input
            type="text"
            id="questionInput"
            placeholder="Ask Krishna your question…"
            onkeypress="handleKeyPress(event)"
          />
          <button onclick="sendQuestion()" id="sendButton">Send</button>
        </div>

      </div>
    </div><!-- end .chat-layout -->

    <script src="auth.js"></script>
    <script>
      // ── Auth Guard ────────────────────────────────────────────────────────
      if (!isLoggedIn()) {
        window.location.href = 'login.html?redirect=chat.html';
      }
    </script>
    <script src="script.js"></script>
    <script>
      function applyAuthToNav() {
        const user = getUser();
        // Target both potential navbar IDs (Landing and Chat)
        const actionsEl = document.getElementById('navActions') || document.getElementById('chatNavRight');
        if (!actionsEl) return;

        if (user) {
          const displayName = user.name || user.email || "User";
          const initials = displayName
            .split(' ')
            .filter(n => n)
            .map(n => n[0])
            .join('')
            .toUpperCase()
            .substring(0, 2);
          
          actionsEl.innerHTML = `
            <div class="user-profile-nav">
              <div class="user-avatar-circle" onclick="toggleUserDropdown(event)">
                ${initials}
              </div>
              <div class="user-dropdown-menu" id="userDropdownMenu">
                <div style="padding: 4px 16px 12px; border-bottom: 1px solid rgba(212,175,55,0.1); margin-bottom: 8px;">
                  <p style="font-size: 14px; color: #fff; font-weight: 600; margin: 0;">${displayName}</p>
                  <p style="font-size: 11px; color: rgba(245,230,161,0.5); margin: 0;">${user.email}</p>
                </div>
                <a href="chat.html" class="dropdown-item">
                  <span>💬</span> Chat with Wisdom Bot
                </a>
                <a href="profile.html" class="dropdown-item">
                  <span>👤</span> View Profile
                </a>
                <div class="dropdown-item logout" onclick="logout()">
                  <span>🚪</span> Sign Out
                </div>
              </div>
            </div>
          `;
        } else {
          actionsEl.innerHTML = `
            <a href="login.html" class="btn-ghost" style="text-decoration:none; margin-right:8px;">Login</a>
            <a href="register.html" class="btn-gold" style="text-decoration:none;">Get Started</a>
          `;
        }
      }
      // The applyAuthToNav() is now called automatically by auth.js on load

      // --- Navbar scroll effect ---
    </script>
  </body>
</html>
