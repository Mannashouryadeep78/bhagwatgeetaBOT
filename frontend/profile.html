<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Profile — Bhagavad Gita Wisdom</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: linear-gradient(135deg, #0D1B2A, #1B2A4E);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }
      .profile-card {
        background: #FAF9F6;
        width: 100%;
        max-width: 480px;
        border-radius: 22px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        border: 1px solid rgba(212,175,55,0.3);
      }
      .profile-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .profile-avatar {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #D4AF37, #F5E6A1);
        color: #0D1B2A;
        font-size: 32px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        margin: 0 auto 16px;
        box-shadow: 0 4px 15px rgba(212,175,55,0.4);
      }
      .profile-header h1 {
        font-family: 'Cinzel', serif;
        font-size: 24px;
        color: #1B2A4E;
        margin-bottom: 4px;
      }
      .profile-header p {
        font-size: 14px;
        color: #666;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #1B2A4E;
        margin-bottom: 6px;
      }
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid rgba(212,175,55,0.2);
        border-radius: 12px;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        transition: border-color 0.2s;
        outline: none;
      }
      .form-group input:focus {
        border-color: #D4AF37;
      }
      .divider {
        height: 1px;
        background: rgba(212,175,55,0.15);
        margin: 32px 0;
      }
      .btn-save {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #D4AF37, #F5E6A1);
        border: none;
        border-radius: 12px;
        color: #0D1B2A;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        font-family: 'Poppins', sans-serif;
      }
      .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(212,175,55,0.4);
      }
      .btn-back {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #D4AF37;
        text-decoration: none;
        font-size: 14px;
      }
      .btn-back:hover {
        text-decoration: underline;
      }
      .message-box {
        padding: 12px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
      }
      .message-success { background: #e6fffa; color: #234e52; border: 1px solid #81e6d9; }
      .message-error { background: #fff5f5; color: #742a2a; border: 1px solid #feb2b2; }
    </style>
  </head>
  <body>
    <div class="krishna-bg"></div>
    
    <!-- Top Navbar -->
    <nav class="chat-nav" style="position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: linear-gradient(135deg, #1B2A4E, #0D1B2A); border-bottom: 1px solid rgba(212,175,55,0.35); z-index: 1000; height: 60px;">
      <div class="chat-nav-left">
        <a href="index.html" style="color: rgba(245,230,161,0.65); text-decoration: none; font-size: 13px;">🪷 Gita Wisdom</a>
      </div>
      <div class="chat-nav-right" id="globalNavActions"></div>
    </nav>

    <div class="profile-card" style="margin-top: 80px;">
      <div class="profile-header">
        <div id="avatar" class="profile-avatar">?</div>
        <h1 id="userName">User Name</h1>
        <p id="userEmail">user@example.com</p>
      </div>

      <div id="statusMsg" class="message-box"></div>

      <form id="profileForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="nameInput" placeholder="Enter your name" required>
        </div>

        <div class="divider"></div>

        <h3 style="font-size: 14px; margin-bottom: 16px; color: #1B2A4E;">Change Password</h3>

        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="currentPassword" placeholder="Required for password change">
        </div>

        <div class="form-group">
          <label>New Password (min 8 chars)</label>
          <input type="password" id="newPassword" placeholder="Leave blank to keep current">
        </div>

        <button type="submit" class="btn-save" id="saveBtn">Save Changes</button>
      </form>

      <a href="javascript:void(0)" onclick="window.history.length > 1 ? window.history.back() : window.location.href='chat.html'" class="btn-back">← Go Back</a>
    </div>

    <script src="auth.js"></script>
    <script>
      // ── Redirect if not logged in ──────────────────────────────────────────
      const user = getUser();
      if (!user) {
        window.location.href = 'login.html';
      }

      // ── Populate initial data ──────────────────────────────────────────────
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('avatar').textContent = user.name.charAt(0).toUpperCase();
      document.getElementById('nameInput').value = user.name;

      const profileForm = document.getElementById('profileForm');
      const statusMsg = document.getElementById('statusMsg');

      function showMsg(text, isError = false) {
        statusMsg.textContent = text;
        statusMsg.style.display = 'block';
        statusMsg.className = 'message-box ' + (isError ? 'message-error' : 'message-success');
        setTimeout(() => { statusMsg.style.display = 'none'; }, 5000);
      }

      profileForm.onsubmit = async (e) => {
        e.preventDefault();
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        const name = document.getElementById('nameInput').value.trim();
        const current_password = document.getElementById('currentPassword').value;
        const new_password = document.getElementById('newPassword').value;

        const payload = { name };
        if (current_password || new_password) {
          payload.current_password = current_password;
          payload.new_password = new_password;
        }

        try {
          const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000/api'
            : 'https://hibque-bhagwatgita-bot.hf.space/api';

          const res = await fetch(`${API_URL}/auth/profile`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${getToken()}`
            },
            body: JSON.stringify(payload)
          });

          const data = await res.json();
          if (res.ok) {
            setUser(data.user);
            document.getElementById('userName').textContent = data.user.name;
            document.getElementById('avatar').textContent = data.user.name.charAt(0).toUpperCase();
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            showMsg('Profile updated successfully!');
          } else {
            showMsg(data.error || 'Update failed.', true);
          }
        } catch (err) {
          showMsg('Cannot reach server.', true);
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save Changes';
        }
      };
    </script>
  </body>
</html>
