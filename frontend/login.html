<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Bhagavad Gita Wisdom</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0D1B2A, #1B2A4E);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        overflow: hidden;
      }
      .bg {
        position: fixed; inset: 0;
        background: url('images/krishna.png') center/cover no-repeat;
        opacity: 0.18;
        z-index: 0;
      }
      .card {
        position: relative; z-index: 1;
        margin-top: 60px;
        background: rgba(13,27,42,0.92);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 24px;
        padding: 48px 44px;
        width: 100%; max-width: 420px;
        box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      }
      .card-logo {
        font-family: 'Cinzel', serif;
        font-size: 22px;
        color: #F5E6A1;
        text-align: center;
        margin-bottom: 8px;
        text-decoration: none;
        display: block;
      }
      .card-sub {
        text-align: center;
        color: rgba(245,230,161,0.5);
        font-size: 13px;
        margin-bottom: 36px;
        font-weight: 300;
      }
      .card h1 {
        font-family: 'Cinzel', serif;
        font-size: 26px;
        color: #fff;
        margin-bottom: 28px;
        text-align: center;
      }
      .form-group { margin-bottom: 20px; }
      .form-group label {
        display: block;
        font-size: 12px;
        color: rgba(212,175,55,0.8);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .form-group input {
        width: 100%;
        padding: 13px 16px;
        border-radius: 10px;
        border: 1.5px solid rgba(212,175,55,0.25);
        background: rgba(255,255,255,0.05);
        color: #FAF9F6;
        font-size: 14px;
        font-family: 'Poppins', sans-serif;
        outline: none;
        transition: border-color 0.2s, background 0.2s;
      }
      .form-group input:focus {
        border-color: #D4AF37;
        background: rgba(212,175,55,0.06);
      }
      .form-group input::placeholder { color: rgba(245,230,161,0.3); }
      .btn-submit {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, #D4AF37, #F5E6A1);
        color: #0D1B2A;
        font-size: 15px;
        font-weight: 600;
        font-family: 'Poppins', sans-serif;
        cursor: pointer;
        margin-top: 8px;
        transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      }
      .btn-submit:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(212,175,55,0.45);
      }
      .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
      .error-msg {
        background: rgba(220,53,69,0.12);
        border: 1px solid rgba(220,53,69,0.4);
        border-radius: 8px;
        padding: 10px 14px;
        color: #ff8a95;
        font-size: 13px;
        margin-bottom: 18px;
        display: none;
      }
      .divider {
        text-align: center;
        margin: 22px 0;
        color: rgba(245,230,161,0.3);
        font-size: 13px;
        position: relative;
      }
      .divider::before, .divider::after {
        content: '';
        position: absolute;
        top: 50%; width: 38%; height: 1px;
        background: rgba(212,175,55,0.15);
      }
      .divider::before { left: 0; }
      .divider::after { right: 0; }
      .btn-guest {
        display: block;
        width: 100%;
        padding: 12px;
        border: 1.5px solid rgba(212,175,55,0.4);
        border-radius: 50px;
        color: #F5E6A1;
        font-size: 13px;
        text-align: center;
        text-decoration: none;
        transition: border-color 0.2s, background 0.2s;
      }
      .btn-guest:hover {
        border-color: #D4AF37;
        background: rgba(212,175,55,0.08);
      }
      .footer-text {
        text-align: center;
        color: rgba(245,230,161,0.45);
        font-size: 13px;
        margin-top: 20px;
      }
      .footer-text a { color: #D4AF37; text-decoration: none; }
      .footer-text a:hover { text-decoration: underline; }
      .loading-spinner {
        width: 16px; height: 16px;
        border: 2px solid rgba(13,27,42,0.4);
        border-top-color: #0D1B2A;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (max-width: 480px) { .card { padding: 36px 24px; } }
    </style>
  </head>
  <body>
    <!-- Top Navbar -->
    <nav class="chat-nav" style="position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: linear-gradient(135deg, #1B2A4E, #0D1B2A); border-bottom: 1px solid rgba(212,175,55,0.35); z-index: 1000; height: 60px;">
      <div class="chat-nav-left">
        <a href="index.html" style="color: rgba(245,230,161,0.65); text-decoration: none; font-size: 13px;">🪷 Gita Wisdom</a>
      </div>
      <div class="chat-nav-right" id="globalNavActions"></div>
    </nav>

    <div class="bg"></div>

    <div class="card">
      <a class="card-logo" href="index.html">🪷 Gita Wisdom</a>
      <p class="card-sub">Timeless guidance for modern life</p>

      <h1>Welcome Back</h1>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
      </form>

      <div class="divider">or</div>

      <a href="chat.html" class="btn-guest">Continue without account &nbsp;&#8594;</a>

      <p class="footer-text" style="margin-top: 28px;">
        Don't have an account? <a href="register.html">Create one free</a>
      </p>
      <p class="footer-text" style="margin-top: 10px;">
        <a href="index.html">&#8592; Back to Home</a>
      </p>
    </div>

    <script src="auth.js"></script>
    <script>
      // Redirect if already logged in
      if (isLoggedIn()) window.location.href = 'chat.html';

      async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submitBtn');
        const errEl = document.getElementById('errorMsg');

        errEl.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span>Signing in…';

        try {
          await apiLogin(email, password);
          window.location.href = 'chat.html';
        } catch (err) {
          errEl.textContent = err.message;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
        }
      }
    </script>
  </body>
</html>
