<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Bhagavad Gita Wisdom</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0D1B2A, #1B2A4E);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        overflow: hidden;
      }
      .bg {
        position: fixed; inset: 0;
        background: url('images/krishna.png') center/cover no-repeat;
        opacity: 0.18;
        z-index: 0;
      }
      .card {
        position: relative; z-index: 1;
        background: rgba(13,27,42,0.92);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 24px;
        padding: 48px 44px;
        width: 100%; max-width: 460px;
        box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      }
      .card-logo {
        font-family: 'Cinzel', serif;
        font-size: 22px;
        color: #F5E6A1;
        text-align: center;
        margin-bottom: 8px;
        text-decoration: none;
        display: block;
      }
      .card-sub {
        text-align: center;
        color: rgba(245,230,161,0.5);
        font-size: 13px;
        margin-bottom: 28px;
        font-weight: 300;
      }
      .card h1 {
        font-family: 'Cinzel', serif;
        font-size: 26px;
        color: #fff;
        margin-bottom: 6px;
        text-align: center;
      }
      .card .subtitle {
        text-align: center;
        color: rgba(245,230,161,0.4);
        font-size: 13px;
        margin-bottom: 28px;
        font-weight: 300;
      }
      .perks {
        display: flex;
        flex-direction: column;
        gap: 7px;
        margin-bottom: 24px;
        padding: 16px;
        background: rgba(212,175,55,0.05);
        border: 1px solid rgba(212,175,55,0.15);
        border-radius: 10px;
      }
      .perk {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: rgba(245,230,161,0.65);
      }
      .perk-icon { color: #D4AF37; }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .form-group { margin-bottom: 16px; }
      .form-group label {
        display: block;
        font-size: 12px;
        color: rgba(212,175,55,0.8);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 7px;
      }
      .form-group input {
        width: 100%;
        padding: 13px 16px;
        border-radius: 10px;
        border: 1.5px solid rgba(212,175,55,0.25);
        background: rgba(255,255,255,0.05);
        color: #FAF9F6;
        font-size: 14px;
        font-family: 'Poppins', sans-serif;
        outline: none;
        transition: border-color 0.2s, background 0.2s;
      }
      .form-group input:focus {
        border-color: #D4AF37;
        background: rgba(212,175,55,0.06);
      }
      .form-group input::placeholder { color: rgba(245,230,161,0.3); }
      .form-group input.input-error { border-color: rgba(220,53,69,0.7); }
      .error-msg {
        background: rgba(220,53,69,0.12);
        border: 1px solid rgba(220,53,69,0.4);
        border-radius: 8px;
        padding: 10px 14px;
        color: #ff8a95;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
      .btn-submit {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, #D4AF37, #F5E6A1);
        color: #0D1B2A;
        font-size: 15px;
        font-weight: 600;
        font-family: 'Poppins', sans-serif;
        cursor: pointer;
        margin-top: 8px;
        transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      }
      .btn-submit:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(212,175,55,0.45);
      }
      .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
      .footer-text {
        text-align: center;
        color: rgba(245,230,161,0.45);
        font-size: 13px;
        margin-top: 18px;
      }
      .footer-text a { color: #D4AF37; text-decoration: none; }
      .footer-text a:hover { text-decoration: underline; }
      .loading-spinner {
        width: 16px; height: 16px;
        border: 2px solid rgba(13,27,42,0.4);
        border-top-color: #0D1B2A;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (max-width: 480px) {
        .card { padding: 36px 24px; }
        .form-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>

    <div class="card">
      <a class="card-logo" href="index.html">🪷 Gita Wisdom</a>
      <p class="card-sub">Begin your journey</p>

      <h1>Create Account</h1>
      <p class="subtitle">Free forever. No credit card required.</p>

      <div class="perks">
        <div class="perk"><span class="perk-icon">✓</span> Save your conversation history</div>
        <div class="perk"><span class="perk-icon">✓</span> Access from any device</div>
        <div class="perk"><span class="perk-icon">✓</span> Unlimited questions, always free</div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="fname">First Name</label>
            <input type="text" id="fname" placeholder="Arjuna" required autocomplete="given-name" />
          </div>
          <div class="form-group">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" placeholder="Pandava" autocomplete="family-name" />
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Repeat password" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Create Free Account</button>
      </form>

      <p class="footer-text">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
      <p class="footer-text" style="margin-top: 10px;">
        <a href="index.html">&#8592; Back to Home</a>
      </p>
    </div>

    <script src="auth.js"></script>
    <script>
      // Redirect if already logged in
      if (isLoggedIn()) window.location.href = 'chat.html';

      async function handleRegister(e) {
        e.preventDefault();
        const fname = document.getElementById('fname').value.trim();
        const lname = document.getElementById('lname').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const btn = document.getElementById('submitBtn');
        const errEl = document.getElementById('errorMsg');

        errEl.style.display = 'none';
        document.getElementById('confirm').classList.remove('input-error');

        if (password !== confirm) {
          document.getElementById('confirm').classList.add('input-error');
          errEl.textContent = 'Passwords do not match.';
          errEl.style.display = 'block';
          return;
        }

        const fullName = lname ? `${fname} ${lname}` : fname;

        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span>Creating account…';

        try {
          await apiRegister(fullName, email, password);
          window.location.href = 'chat.html';
        } catch (err) {
          errEl.textContent = err.message;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = 'Create Free Account';
        }
      }
    </script>
  </body>
</html>
